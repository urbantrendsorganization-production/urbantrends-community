version: "3.9"

services:
  db:
    image: postgres:16
    container_name: urbantrends-community-db
    environment:
      POSTGRES_USER: urban_community
      POSTGRES_PASSWORD: community2026
      POSTGRES_DB: urbantrends_comm
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5435:5432"
    networks:
      - urbantrends_community

  urbantrends-community:
    build: ../back-end/community-backend-app/
    container_name: urbantrends-community
    restart: always
    # Wait for DB to be healthy before starting Gunicorn
    command: >
      sh -c "python manage.py migrate &&
             gunicorn community_appliccation.wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - ../back-end/community-backend-app:/app
    ports:
      - "127.0.0.1:8003:8000"
    env_file:
      - ../back-end/community-backend-app/community.env
    depends_on:
      - db
    networks:
      - urbantrends_community
volumes:
  postgres_data:

networks:
  urbantrends_community:
